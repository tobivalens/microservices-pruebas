# ─────────────────────────────────────────
# FRONTEND  ·  Vue  ·  puerto 8080
# NodePort para acceder desde el navegador (minikube)
# Fix: aumentar memoria - el dev-server de Webpack necesita al menos 512Mi
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: kaeltobias/frontend:v1
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"   # Webpack dev-server necesita bastante RAM
              cpu: "500m"
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PORT
            - name: AUTH_API_ADDRESS
              value: "http://auth-api.backend.svc.cluster.local:8000"
            - name: TODOS_API_ADDRESS
              value: "http://todos-api.backend.svc.cluster.local:8082"
            - name: ZIPKIN_URL
              value: "http://zipkin.observability.svc.cluster.local:9411/api/v2/spans"

            # Limitar memoria del proceso Node explícitamente
            #
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
