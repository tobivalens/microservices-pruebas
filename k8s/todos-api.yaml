# ─────────────────────────────────────────
# TODOS-API  ·  NodeJS  ·  puerto 8082
# Depende de redis
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todos-api
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todos-api
  template:
    metadata:
      labels:
        app: todos-api
        tier: backend
    spec:
      containers:
        - name: todos-api
          image: kaeltobias/todos-api:v1
          ports:
            - containerPort: 8082
          env:
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_SECRET
            - name: TODO_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TODO_API_PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: REDIS_CHANNEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_CHANNEL
---
apiVersion: v1
kind: Service
metadata:
  name: todos-api
  namespace: backend
spec:
  selector:
    app: todos-api
  ports:
    - port: 8082
      targetPort: 8082
